version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-biodjango}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}

  # Redis
  redis:
    image: redis:7-alpine

  # Backend API (Gunicorn)
  web:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/static
      - ${BLAST_DB_PATH:-./blastdb}:/data/blastdb
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost 127.0.0.1 [::1] web}
      - SQL_ENGINE=django.db.backends.postgresql
      - SQL_DATABASE=${POSTGRES_DB:-biodjango}
      - SQL_USER=${POSTGRES_USER:-postgres}
      - SQL_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - SQL_HOST=db
      - SQL_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Celery Worker
  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ${BLAST_DB_PATH:-./blastdb}:/data/blastdb
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - SQL_ENGINE=django.db.backends.postgresql
      - SQL_DATABASE=${POSTGRES_DB:-biodjango}
      - SQL_USER=${POSTGRES_USER:-postgres}
      - SQL_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - SQL_HOST=db
      - SQL_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  # Nginx (serves both frontend and proxies API)
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
